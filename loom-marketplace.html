<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Loom — Marketplace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fdfaf6;--surface:#fff;--surface2:#fdf4f1;--surface3:#f7f0e6;--border:#edddd0;--border2:#f7f0e6;--text:#271d14;--text2:#6b5744;--text3:#9c8070;--text4:#c4b5a3;--clay:#c1593a;--clay-l:#fdf4f1;--clay-m:#f2c4b4;--green:#1a7a4a;--red:#c13a3a}
.dark{--bg:#120d08;--surface:#1c1208;--surface2:#261808;--surface3:#301f0a;--border:#3d2810;--border2:#2a1c08;--text:#f0e4d4;--text2:#c4a078;--text3:#8a6040;--text4:#503828;--clay:#d96f49;--clay-l:#2a1808;--clay-m:#4a2418}
body{background:var(--bg);color:var(--text);font-family:'Source Sans 3',system-ui,sans-serif;min-height:100vh}
.font-serif{font-family:'Source Serif 4',Georgia,serif}
nav{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:300}
.nav-inner{max-width:1080px;margin:0 auto;padding:0 16px;height:52px;display:flex;align-items:center;gap:10px}
.inp{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 12px;font-size:14px;font-family:inherit;outline:none;width:100%;transition:border .15s}
.inp:focus{border-color:var(--clay)}
textarea.inp{resize:vertical;min-height:70px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;border:none;transition:all .15s;text-decoration:none}
.btn-clay{background:var(--clay);color:#fff}.btn-clay:hover{filter:brightness(1.08)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}.btn-ghost:hover{border-color:var(--clay);color:var(--clay)}
.btn-green{background:var(--green);color:#fff}
.btn-pill{border-radius:999px}.btn-sm{padding:5px 12px;font-size:13px}.btn-xs{padding:3px 8px;font-size:11px;border-radius:6px}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0;font-family:ui-monospace,monospace;user-select:none}
.sec-title{font-size:11px;font-family:ui-monospace,monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--text4);margin-bottom:12px}
.listing{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:box-shadow .15s,border-color .15s;display:flex;flex-direction:column}
.listing:hover{border-color:var(--clay);box-shadow:0 2px 10px rgba(193,89,58,.08)}
.listing.sold{opacity:.6}
.listing-img{width:100%;height:160px;object-fit:cover;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--text4)}
.listing-body{padding:12px;flex:1;display:flex;flex-direction:column}
.price-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:5px;font-size:13px;font-weight:700;font-family:ui-monospace,monospace}
.sold-badge{background:#e8f0e8;color:var(--green)}
.avail-badge{background:var(--clay-l);color:var(--clay)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;align-items:center;justify-content:center;backdrop-filter:blur(2px);padding:16px}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:520px;width:100%;max-height:88vh;overflow-y:auto}
.filter-pill{padding:5px 14px;border-radius:999px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text3);transition:all .15s;white-space:nowrap}
.filter-pill.on{background:var(--clay);color:#fff;border-color:var(--clay)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@media(max-width:600px){.hide-sm{display:none!important}}
.page-fade{animation:pageFadeIn .25s ease}
@keyframes pageFadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="loom.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0">
      <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
        <rect x="3" y="3" width="3.5" height="20" rx="1.75" fill="var(--clay)" opacity=".3"/>
        <rect x="9.5" y="3" width="3.5" height="20" rx="1.75" fill="var(--clay)" opacity=".55"/>
        <rect x="16" y="3" width="3.5" height="20" rx="1.75" fill="var(--clay)" opacity=".3"/>
        <rect x="3" y="4" width="20" height="3" rx="1.5" fill="var(--clay)"/>
        <rect x="3" y="11.5" width="20" height="3" rx="1.5" fill="var(--clay)" opacity=".55"/>
        <rect x="3" y="19" width="20" height="3" rx="1.5" fill="var(--clay)" opacity=".25"/>
      </svg>
      <span class="font-serif" style="font-size:20px;font-weight:600;color:var(--text);letter-spacing:-.3px">Loom</span>
    </a>
    <span style="font-size:10px;font-family:ui-monospace,monospace;color:var(--text4);letter-spacing:.1em;text-transform:uppercase" class="hide-sm">Marketplace</span>
    <div style="flex:1;max-width:300px;position:relative;margin-left:4px">
      <input type="text" id="mkt-search" placeholder="Search listings…" oninput="onSearch(this.value)" style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:20px;padding:6px 12px 6px 30px;font-size:13px;outline:none" onfocus="this.style.borderColor='var(--clay)'" onblur="this.style.borderColor='var(--border)'">
      <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text4);pointer-events:none">🔍</span>
    </div>
    <div style="margin-left:auto;display:flex;gap:8px">
      <button onclick="toggleDark()" style="background:transparent;border:1px solid var(--border);border-radius:8px;padding:6px 9px;cursor:pointer;font-size:14px"><span id="dark-ico">🌙</span></button>
      <a href="loom-settings.html" class="btn btn-ghost btn-sm btn-pill hide-sm">Settings</a>
      <a href="loom.html" class="btn btn-ghost btn-sm btn-pill hide-sm">← Feed</a>
      <button onclick="openModal('post-modal')" class="btn btn-clay btn-sm btn-pill">+ List item</button>
    </div>
  </div>
</nav>

<div style="max-width:1080px;margin:0 auto;padding:20px 16px">

  <!-- Filter bar -->
  <div style="display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px">
    <button class="filter-pill on" onclick="setCat('all',this)">All</button>
    <button class="filter-pill" onclick="setCat('for-sale',this)">For sale</button>
    <button class="filter-pill" onclick="setCat('iso',this)">ISO</button>
    <button class="filter-pill" onclick="setCat('free',this)">Free</button>
    <button class="filter-pill" onclick="setCat('trade',this)">Trade / swap</button>
    <button class="filter-pill" onclick="setCat('services',this)">Services</button>
    <span style="margin-left:auto;flex-shrink:0;display:flex;gap:6px;align-items:center">
      <select id="reg-filter" onchange="renderListings()" class="inp" style="width:auto;padding:5px 24px 5px 10px;font-size:12px;border-radius:20px"><option value="">All regions</option></select>
      <select id="sort-sel" onchange="renderListings()" class="inp" style="width:auto;padding:5px 24px 5px 10px;font-size:12px;border-radius:20px">
        <option value="new">Newest</option>
        <option value="price-asc">Price ↑</option>
        <option value="price-desc">Price ↓</option>
      </select>
      <label style="display:flex;align-items:center;gap:4px;font-size:12px;font-family:ui-monospace,monospace;color:var(--text3);white-space:nowrap;cursor:pointer"><input type="checkbox" id="hide-sold" onchange="renderListings()" style="accent-color:var(--clay)"> Hide sold</label>
      <label style="display:flex;align-items:center;gap:4px;font-size:12px;font-family:ui-monospace,monospace;color:var(--text3);white-space:nowrap;cursor:pointer"><input type="checkbox" id="show-saved" onchange="renderListings()" style="accent-color:var(--clay)"> Saved only</label>
    </span>
  </div>

  <!-- Stats bar -->
  <div style="display:flex;gap:16px;margin-bottom:20px;font-size:12px;font-family:ui-monospace,monospace;color:var(--text4)">
    <span id="listing-count">—</span>
    <span id="listing-region"></span>
  </div>

  <!-- Grid -->
  <div id="listings-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px"></div>
  <div id="listings-empty" style="display:none;text-align:center;padding:60px 0;color:var(--text4)">
    <div style="font-size:32px;margin-bottom:10px">🏪</div>
    <div style="font-size:15px">No listings found.</div>
  </div>

</div>

<!-- Detail modal -->
<div class="modal-bg" id="detail-modal">
  <div class="modal" id="detail-body"></div>
</div>

<!-- Post listing modal -->
<div class="modal-bg" id="post-modal">
  <div class="modal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
      <h2 class="font-serif" style="font-size:20px">List an item</h2>
      <button onclick="closeModal('post-modal')" style="background:none;border:none;cursor:pointer;font-size:20px;color:var(--text3)">×</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div>
        <label style="font-size:12px;font-family:ui-monospace,monospace;color:var(--text3);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em">Listing type</label>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <button class="filter-pill on" id="type-for-sale" onclick="setType('for-sale',this)">For sale</button>
          <button class="filter-pill" id="type-iso" onclick="setType('iso',this)">ISO</button>
          <button class="filter-pill" id="type-free" onclick="setType('free',this)">Free</button>
          <button class="filter-pill" id="type-trade" onclick="setType('trade',this)">Trade / swap</button>
          <button class="filter-pill" id="type-services" onclick="setType('services',this)">Service</button>
        </div>
      </div>
      <div>
        <label style="font-size:12px;font-family:ui-monospace,monospace;color:var(--text3);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em">Title *</label>
        <input type="text" id="f-title" class="inp" placeholder="e.g. Honda generator, Childcare Tuesdays…" maxlength="80">
      </div>
      <div>
        <label style="font-size:12px;font-family:ui-monospace,monospace;color:var(--text3);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em">Description</label>
        <textarea id="f-desc" class="inp" placeholder="Condition, details, what you're offering or looking for…" maxlength="500" rows="3"></textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div>
          <label style="font-size:12px;font-family:ui-monospace,monospace;color:var(--text3);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em">Price</label>
          <input type="text" id="f-price" class="inp" placeholder="e.g. H$40, negotiable…">
        </div>
        <div>
          <label style="font-size:12px;font-family:ui-monospace,monospace;color:var(--text3);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em">Condition</label>
          <select id="f-cond" class="inp">
            <option value="">—</option>
            <option value="new">New</option>
            <option value="like-new">Like new</option>
            <option value="good">Good</option>
            <option value="fair">Fair</option>
            <option value="parts-only">Parts only</option>
          </select>
        </div>
      </div>
      <div>
        <label style="font-size:12px;font-family:ui-monospace,monospace;color:var(--text3);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em">Image URL (optional)</label>
        <input type="text" id="f-img" class="inp" placeholder="https://…">
      </div>
      <div>
        <label style="font-size:12px;font-family:ui-monospace,monospace;color:var(--text3);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em">Contact</label>
        <input type="text" id="f-contact" class="inp" placeholder="How to reach you" maxlength="80">
      </div>
      <div>
        <label style="font-size:12px;font-family:ui-monospace,monospace;color:var(--text3);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em">Region</label>
        <select id="f-region" class="inp"></select>
      </div>
      <button onclick="submitListing()" class="btn btn-clay" style="width:100%;margin-top:4px">Post listing</button>
    </div>
  </div>
</div>

<!-- Offer modal -->
<div class="modal-bg" id="offer-modal">
  <div class="modal" style="max-width:400px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <h2 class="font-serif" style="font-size:18px">Make an offer</h2>
      <button onclick="closeModal('offer-modal')" style="background:none;border:none;cursor:pointer;font-size:20px;color:var(--text3)">×</button>
    </div>
    <div id="offer-listing-info" style="background:var(--surface2);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:13px;color:var(--text2)"></div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div>
        <label style="font-size:12px;font-family:ui-monospace,monospace;color:var(--text3);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em">Your offer</label>
        <input type="text" id="offer-price" class="inp" placeholder="e.g. H$35 or best offer">
      </div>
      <div>
        <label style="font-size:12px;font-family:ui-monospace,monospace;color:var(--text3);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em">Message (optional)</label>
        <textarea id="offer-msg" class="inp" rows="2" placeholder="Any questions or details…"></textarea>
      </div>
      <div style="font-size:11px;font-family:ui-monospace,monospace;color:var(--text4);line-height:1.7">Offers and messages are visible to the seller and retained by Altura Analytics.</div>
      <button onclick="submitOffer()" class="btn btn-clay" style="width:100%">Send offer</button>
    </div>
  </div>
</div>
